databases:
  - name: nomina-db
    plan: free
    databaseName: nomina_production
    user: nomina

services:
  - type: web
    name: nomina
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerCommand: ./bin/rails server -b 0.0.0.0 -p $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nomina-db
          property: connectionString
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
